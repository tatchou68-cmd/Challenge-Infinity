<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Remote Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bleu: #0082c3;
            --rouge: #d32f2f;
            --fond: #0f0f0f;
            --gris-bouton: #252525;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--fond); 
            color: white; 
            margin: 0; 
            padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            touch-action: manipulation;
        }

        h2 { margin: 10px 0 20px 0; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; }

        .group { 
            width: 100%; max-width: 450px;
            border-radius: 20px; padding: 15px; margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .multi { border-top: 5px solid var(--bleu); box-shadow: 0 10px 30px rgba(0, 130, 195, 0.2); }
        .confort { border-top: 5px solid var(--rouge); box-shadow: 0 10px 30px rgba(211, 47, 47, 0.2); }

        h3 { margin: 0 0 15px 0; font-size: 1rem; text-align: center; opacity: 0.9; }

        .choix-joueurs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 15px;
        }

        .btn-joueur { 
            background: var(--gris-bouton);
            border: 1px solid #444;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            text-align: left;
        }

        .btn-joueur:active { background: #444; transform: scale(0.95); border-color: white; }

        .btn-joueur img { 
            width: 35px; height: 35px; 
            border-radius: 50%; 
            margin-right: 10px; 
            object-fit: cover;
            background: #000;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-but { 
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #2e7d32, #4caf50); 
            border: none; border-radius: 12px;
            color: white; font-size: 18px; font-weight: 900;
            text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .btn-but:active { transform: scale(0.98); filter: brightness(1.2); }

        .reset { 
            background: transparent; border: 1px solid #333; 
            color: #555; padding: 10px 20px; border-radius: 10px;
            margin-top: 20px; font-size: 12px;
        }

        .status { font-size: 11px; margin-top: 15px; color: #4caf50; opacity: 0.7; }
    </style>
</head>
<body>

    <h2>🕹️ INFINITY CONTROL</h2>

    <div class="group multi">
        <h3 style="color: var(--bleu)">MULTIMÉDIA</h3>
        <div class="choix-joueurs" id="liste-multi"></div>
        <button class="btn-but" onclick="actionVente('multi', 'BUT MULTI', 100)">⚽ BUT !</button>
    </div>

    <div class="group confort">
        <h3 style="color: var(--rouge)">CONFORT</h3>
        <div class="choix-joueurs" id="liste-confort"></div>
        <button class="btn-but" onclick="actionVente('confort', 'BUT CONFORT', -100)">⚽ BUT !</button>
    </div>

    <button class="reset" onclick="resetMatch()">Réinitialiser le match</button>
    <div id="notif" class="status">Connecté au stade</div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCqgVEYrpem4KgV8OXqFN9ybMNPIz8gg9o",
            authDomain: "challenge-infinity.firebaseapp.com",
            databaseURL: "https://challenge-infinity-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "challenge-infinity",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LISTES DES JOUEURS (Assure-toi que les noms correspondent aux fichiers .png)
        const teamMulti = ["Anthony", "Bruno", "Lionel", "Mika", "Paolo", "Raph", "Renaud", "Stephane", "Nico"];
        const teamConfort = ["Christine", "Elias", "Julien", "Yassine", "Severine", "Fatima", "Emilia", "Olivier", "Hayet"];

        function genererBoutons() {
            const containerMulti = document.getElementById('liste-multi');
            teamMulti.forEach(nom => {
                const nomLower = nom.toLowerCase();
                containerMulti.innerHTML += `
                    <button class="btn-joueur" onclick="actionVente('multi', '${nom}', 8)">
                        <img src="${nomLower}.png" onerror="this.src='ballon.png'">
                        <span>${nom}</span>
                    </button>`;
            });

            const containerConfort = document.getElementById('liste-confort');
            teamConfort.forEach(nom => {
                const nomLower = nom.toLowerCase();
                containerConfort.innerHTML += `
                    <button class="btn-joueur" onclick="actionVente('confort', '${nom}', -8)">
                        <img src="${nomLower}.png" onerror="this.src='Image/ballon.png'">
                        <span>${nom}</span>
                    </button>`;
            });
        }

        function actionVente(equipe, nomJoueur, valeur) {
            const ref = db.ref('match');
            ref.once('value').then(snap => {
                let data = snap.val() || { position: 50, scoreMulti: 0, scoreConfort: 0 };
                
                data.dernierVendeur = nomJoueur;
                data.equipeVendeur = equipe;
                data.updateTime = Date.now();

                if (Math.abs(valeur) === 100) { 
                    if (equipe === 'multi') data.scoreMulti++;
                    else data.scoreConfort++;
                    data.position = 50;
                } else {
                    data.position += valeur;
                }
                
                if (data.position > 92) data.position = 92;
                if (data.position < 8) data.position = 8;
                
                ref.set(data);
                
                // Feedback visuel
                const notif = document.getElementById('notif');
                notif.innerText = `Dernière action : ${nomJoueur} (${new Date().toLocaleTimeString()})`;
                if (window.navigator.vibrate) window.navigator.vibrate(40);
            });
        }

        function resetMatch() {
            if(confirm("Remettre les scores à zéro ?")) {
                db.ref('match').set({ 
                    position: 50, 
                    scoreMulti: 0, 
                    scoreConfort: 0, 
                    dernierVendeur: "Nouveau Match",
                    updateTime: Date.now()
                });
            }
        }

        genererBoutons();
    </script>
</body>
</html>
