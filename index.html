<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Infinity Challenge TV</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BANDEAU SCORE */
        #header {
            width: 100%;
            height: 15vh;
            background: linear-gradient(to bottom, #111, #000);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 3px solid #333;
        }

        .score-box {
            font-size: 3.5rem;
            text-shadow: 0 0 20px gold;
        }

        /* TERRAIN DE FOOT */
        #stade {
            position: relative;
            width: 74vw; /* Un peu réduit pour laisser de la place aux 2 colonnes */
            height: 75vh;
            background-image: url('Image/terrain.png');
            background-size: 100% 100%;
            margin-top: 20px;
            border: 5px solid #444;
            border-radius: 10px;
        }

        /* BALLON */
        #ballon {
            position: absolute;
            width: 60px;
            height: 60px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            z-index: 10;
        }

        /* JOUEURS (2 COLONNES) */
        .cote {
            position: absolute;
            top: 15%;
            width: 12vw;
            height: 70vh;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 10px;
        }

        .cote-gauche { left: 1vw; }
        .cote-droite { right: 1vw; }

        .figurine-fixe {
            width: 45%; /* Permet d'en mettre 2 côte à côte */
            height: auto;
            filter: drop-shadow(2px 4px 5px black);
        }

        /* NOTIFICATION DE VENTE */
        #notif-vente {
            display: none;
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 60px;
            border-radius: 20px;
            border: 4px solid gold;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }

        #notif-vente h1 {
            color: gold;
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="header">
        <div style="color: #0082c3;">MULTIMÉDIA</div>
        <div id="tableau-score" class="score-box">0 - 0</div>
        <div style="color: #d32f2f;">CONFORT</div>
    </div>

    <div class="cote cote-gauche">
        <img src="Image/Anthony.png" class="figurine-fixe">
        <img src="Image/Bruno.png" class="figurine-fixe">
        <img src="Image/Lionel.png" class="figurine-fixe">
        <img src="Image/Mika.png" class="figurine-fixe">
        <img src="Image/Paolo.png" class="figurine-fixe">
        <img src="Image/Raph.png" class="figurine-fixe">
    </div>

    <div id="stade">
        <img src="Image/ballon.png" id="ballon">
    </div>

    <div class="cote cote-droite">
        <img src="Image/Christine.png" class="figurine-fixe">
        <img src="Image/Elias.png" class="figurine-fixe">
        <img src="Image/Julien.png" class="figurine-fixe">
        <img src="Image/Zina.png" class="figurine-fixe">
        <img src="Image/Yassine.png" class="figurine-fixe">
        <img src="Image/Severine.png" class="figurine-fixe">
    </div>

    <div id="notif-vente">
        <h1 id="nom-vendeur">BRAVO !</h1>
    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCqgVEYrpem4KgV8OXqFN9ybMNPIz8gg9o",
            authDomain: "challenge-infinity.firebaseapp.com",
            databaseURL: "https://challenge-infinity-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "challenge-infinity",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ÉCOUTE DES CHANGEMENTS
        db.ref('match').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // 1. Déplacer le ballon
                document.getElementById('ballon').style.left = data.position + "%";

                // 2. Mettre à jour le score
                document.getElementById('tableau-score').innerText = data.scoreMulti + " - " + data.scoreConfort;

                // 3. Afficher la notification si un nouveau vendeur est détecté
                if (data.dernierVendeur && data.dernierVendeur !== "Nouveau Match") {
                    afficherNotif(data.dernierVendeur);
                }
            }
        });

        function afficherNotif(nom) {
            const notif = document.getElementById('notif-vente');
            const texte = document.getElementById('nom-vendeur');
            
            texte.innerText = "🏆 " + nom + " !";
            notif.style.display = "block";
            
            // On cache la notif après 4 secondes
            setTimeout(() => {
                notif.style.display = "none";
            }, 4000);
        }
    </script>
</body>
</html>
