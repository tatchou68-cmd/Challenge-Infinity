<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Cup - Match de Ventes</title>
    <!-- Bibliothèques nécessaires -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bleu-infinity: #0082c3;
            --rouge-infinity: #d32f2f;
        }

        body {
            margin: 0; background-color: #1a1a1a; font-family: 'Arial Black', sans-serif;
            color: white; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #tv-screen {
    width: 100vw;
    height: 100vh;
    aspect-ratio: 16 / 9;
    margin: auto;
    background: radial-gradient(circle, #004d73, #000);
    position: relative;
    overflow: hidden;
}

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; background: black;
            border-bottom: 3px solid;
            border-image: linear-gradient(to right, var(--bleu-infinity), var(--rouge-infinity)) 1;
            height: 80px;
        }

        .header-title { text-align: center; flex-grow: 1; }
        header h1 { margin: 0; font-size: 2.5vh; text-transform: uppercase; }
        header p { margin: 0; font-size: 0.9vw; color: #ccc; }
        .logo-infinity { width: 90px; height: auto; }

        #stade {
    position: absolute;
    top: 20%;
    left: 20%;
    width: 60%;
    height: 55%;

    background-image: url('terrain.png');
    background-size: cover;
    background-position: center;
    border: 4px solid white;
}

        .cote-gauche, .cote-droite {
    position: absolute;
    top: 15%;
    width: 15%;
    height: 70%;

    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: center;
    gap: 12px;
}
        .cote-gauche { left: 0%; }
        .cote-droite { right: 0%; }

        .figurine-fixe { 
    width: 5vw;
    max-width: 90px;
    min-width: 50px;
    height: auto;

    filter: drop-shadow(2px 4px 6px black);

    transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;

    backface-visibility: hidden;
    transform-style: preserve-3d;
}

    .figurine-fixe:hover {
        transform: scale(1.1);
    }

        #ballon {
            position: absolute; width: 4vw; max-width: 60px; min-width: 30px; height: 50px;
            left: 50%; top: 45%; transform: translate(-50%, -50%);
            transition: all 2s ease-out; z-index: 10;
        }
        #ballon img { width: 100%; }

        #footer-scores {
            position: absolute; bottom: 20px; width: 90%; left: 5%; height: 60px;
            display: flex; justify-content: center; align-items: stretch;
        }

        .score-segment {
            display: flex; align-items: center; font-weight: bold;
            color: white; text-transform: uppercase; font-size: 1.1vw;
        }

        .score-multi {
            background: linear-gradient(180deg, #1a3a5a 0%, #0d1f33 100%);
            border-bottom: 4px solid var(--bleu-infinity);
            clip-path: polygon(0 15%, 102% 15%, 94% 100%, 0% 100%); 
            flex: 1.5; justify-content: flex-start; padding-left: 20px; margin-right: -30px;
        }

        .score-central {
            background: linear-gradient(180deg, #0082c3 0%, #005a87 100%);
            clip-path: polygon(6% 0, 94% 0, 100% 100%, 0% 100%); 
            flex: 1.2; justify-content: center; align-items: center;
            flex-direction: column; z-index: 2; border-top: 2px solid rgba(255,255,255,0.3);
        }

        .score-confort {
            background: linear-gradient(180deg, #3d1a1a 0%, #260d0d 100%);
            border-bottom: 4px solid var(--rouge-infinity);
            clip-path: polygon(-2% 15%, 100% 15%, 100% 100%, 6% 100%); 
            flex: 1.5; justify-content: flex-end; padding-right: 20px; margin-left: -30px;
        }

        #tableau-score { font-size: 2.2vw; line-height: 1; }
        .passes-count { font-size: 0.8vw; margin-top: 5px; color: #ffeb3b; }

        #overlay-but {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 10vw; font-weight: 900; color: #ffeb3b; text-shadow: 0 0 20px #000, 5px 5px 0px #f44336;
            z-index: 1000; pointer-events: none; transition: transform 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49);
            text-transform: uppercase; white-space: nowrap;
        }
        #overlay-but.active { transform: translate(-50%, -50%) scale(1); }
    
#recap-final {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    background: rgba(0, 0, 0, 0.95); /* Noir profond légèrement transparent */
    padding: 60px;
    border: 8px solid gold;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    min-width: 50%;
}

#recap-final.active {
    display: block !important;
}

.stats-finales {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin: 40px 0;
}

.equipe-bilan {
    flex: 1;
    font-size: 2.5vw;
}

.score-final {
    font-size: 6vw;
    color: white;
    margin-top: 10px;
}

.vs-separator {
    font-size: 3vw;
    color: gold;
    padding: 0 40px; /* C'est cet espace qui crée le décalage entre les deux blocs */
    font-style: italic;
}
}

#recap-final.active {
    display: block !important; /* On force l'affichage */
}
#recap-final h2 { color: #ffeb3b; font-size: 3vw; margin-top: 0; }
.stats-finales { font-size: 2vw; margin: 20px 0; display: flex; justify-content: space-around; }    
    </style>
</head>
<body>

<div id="tv-screen">
    <header>
        <img src="infinity-bleu.png" class="logo-infinity">
        <div class="header-title">
            <h1>INFINITY CUP - MULTIMÉDIA vs CONFORT</h1>
            <p>VENDS UN INFINITY, FAIS AVANCER LE BALLON !</p>
        </div>
        <img src="infinity-rouge.png" class="logo-infinity">
    </header>

    <div id="overlay-but">BUUUUUUT !</div>

    <div class="cote-gauche">
        <!-- Tes images joueurs ici... -->
        <img src="anthony.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="bruno.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="lionel.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="mika.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="paolo.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="raph.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="renaud.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="stephane.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="nico.png" class="figurine-fixe" onerror="this.src='ballon.png'">
    </div>

    <div id="stade">
        <div id="ballon"><img src="ballon.png"></div>
    </div>

    <div class="cote-droite">
        <!-- Tes images joueurs ici... -->
        <img src="christine.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="elias.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="julien.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="yassine.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="severine.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="fatima.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="emilia.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="olivier.png" class="figurine-fixe" onerror="this.src='ballon.png'">
        <img src="hayet.png" class="figurine-fixe" onerror="this.src='ballon.png'">
    </div>

    <div id="footer-scores">
        <div class="score-segment score-multi">Équipe Multimédia</div>
        <div class="score-segment score-central">
            <div id="tableau-score">0 - 0</div>
            <div class="passes-count">
    <span style="color: var(--bleu-infinity)">MULTI: <span id="compteur-multi">0</span>/3</span>
    <span style="margin: 0 10px;">|</span>
    <span style="color: var(--rouge-infinity)">CONFORT: <span id="compteur-confort">0</span>/3</span>
</div>
        </div>
        <div class="score-segment score-confort">Équipe Confort</div>
    </div>

    <div id="recap-final">
    <h2>FIN DU MATCH</h2>
    <div class="stats-finales">
        <div class="equipe-bilan">
            <span style="color: var(--bleu-infinity)">MULTIMÉDIA</span>
            <div id="final-multi" class="score-final">0</div>
        </div>
        
        <div class="vs-separator">VS</div>
        
        <div class="equipe-bilan">
            <span style="color: var(--rouge-infinity)">CONFORT</span>
            <div id="final-confort" class="score-final">0</div>
        </div>
    </div>
    <p style="font-size: 1.2vw; color: #aaa; margin-top: 20px;">Fin de match</p>
</div>

</div>

<script>
    // 1. Configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCqgVEYrpem4KgV8OXqFN9ybMNPIz8gg9o",
        authDomain: "challenge-infinity.firebaseapp.com",
        databaseURL: "https://challenge-infinity-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "challenge-infinity",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    db.goOnline(); 

    let dernierTopVente = 0; 

    // 2. Écoute de la base de données
    db.ref('match').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const ballon = document.getElementById('ballon');
        const scoreTableau = document.getElementById('tableau-score');
        const overlay = document.getElementById('overlay-but');
        const recapBox = document.getElementById('recap-final');
        
        // Cibles pour les deux compteurs de série
        const multiElem = document.getElementById('compteur-multi');
        const confortElem = document.getElementById('compteur-confort');

        // MISE À JOUR VISUELLE
        ballon.style.left = data.position + "%";
        scoreTableau.innerText = (data.scoreMulti || 0) + " - " + (data.scoreConfort || 0);
        
        // Mise à jour des deux compteurs en temps réel
        if(multiElem) multiElem.innerText = data.passesMulti || 0;
        if(confortElem) confortElem.innerText = data.passesConfort || 0;

        // GESTION DU RÉCAP
        if (data.matchTermine === true) {
            document.getElementById('final-multi').innerText = data.scoreMulti || 0;
            document.getElementById('final-confort').innerText = data.scoreConfort || 0;
            recapBox.classList.add('active');
        } else {
            recapBox.classList.remove('active');
        }

        // ANIMATIONS DES JOUEURS
        if (data.updateTime && data.updateTime > dernierTopVente) {
            dernierTopVente = data.updateTime;

            if (data.dernierVendeur) {
                const nomVendeur = data.dernierVendeur.toLowerCase().trim();
                const toutesLesImages = document.querySelectorAll('.figurine-fixe');
                let joueurImage = null;

                toutesLesImages.forEach(img => {
                    const srcImage = img.getAttribute('src').toLowerCase();
                    if (srcImage.includes(nomVendeur)) {
                        joueurImage = img;
                    }
                });

                if (joueurImage) {
                    const rectBallon = ballon.getBoundingClientRect();
                    const rectJoueur = joueurImage.getBoundingClientRect();
                    const distX = rectBallon.left - rectJoueur.left;
                    const distY = rectBallon.top - rectJoueur.top;

                    joueurImage.style.zIndex = "100";
                    // Animation fluide et douce[cite: 2]
                    joueurImage.style.transition = "transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)";
                    joueurImage.style.transform = `translate(${distX}px, ${distY}px) scale(1.4) rotate(15deg)`;

                    setTimeout(() => {
                        joueurImage.style.transform = "translate(0, 0) scale(1) rotate(0deg)";
                        setTimeout(() => { joueurImage.style.zIndex = "1"; }, 1200);
                    }, 1800);
                }
            }

            // GESTION DU BUT
            if (data.butVientDeMarquer === true) {
                overlay.classList.add('active');
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => overlay.classList.remove('active'), 3000);
            }
        }
    });
</script>
</body>
</html>
