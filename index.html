<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Cup - Match de Ventes</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bleu-infinity: #0082c3;
            --rouge-infinity: #d32f2f;
        }

        body {
            margin: 0; background-color: #1a1a1a; font-family: 'Arial Black', sans-serif;
            color: white; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #tv-screen {
            width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh;
            background: radial-gradient(circle, #004d73, #000);
            position: relative; border: 10px solid #333;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; background: black;
            border-bottom: 3px solid;
            border-image: linear-gradient(to right, var(--bleu-infinity), var(--rouge-infinity)) 1;
            height: 80px;
        }

        .header-title { text-align: center; flex-grow: 1; }
        header h1 { margin: 0; font-size: 2.2vw; text-transform: uppercase; }
        header p { margin: 0; font-size: 0.9vw; color: #ccc; }
        .logo-infinity { width: 90px; height: auto; }

        #stade {
            position: absolute; top: 18%; left: 12%; width: 76%; height: 60%;
            background-image: url('terrain.png'); 
            background-size: 100% 100%; background-repeat: no-repeat;
            border: 4px solid white;
        }

        .cote-gauche, .cote-droite {
            position: absolute; top: 18%; width: 12%; height: 60%;
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 8px;
        }
        .cote-gauche { left: 0%; }
        .cote-droite { right: 0%; }

        .figurine-fixe { 
            width: 40%; height: auto; filter: drop-shadow(2px 4px 6px black); 
        }

        #ballon {
            position: absolute; width: 50px; height: 50px;
            left: 50%; top: 45%; transform: translate(-50%, -50%);
            transition: all 0.8s ease-out; z-index: 10;
        }
        #ballon img { width: 100%; }

        /* FOOTER SCORES */
        #footer-scores {
            position: absolute; bottom: 20px; width: 90%; left: 5%; height: 60px;
            display: flex; justify-content: center; align-items: stretch;
        }

        .score-segment {
            display: flex; align-items: center; font-weight: bold;
            color: white; text-transform: uppercase; font-size: 1.1vw;
        }

        .score-multi {
            background: linear-gradient(180deg, #1a3a5a 0%, #0d1f33 100%);
            border-bottom: 4px solid var(--bleu-infinity);
            clip-path: polygon(0 0, 100% 0, 92% 100%, 0% 100%); 
            flex: 1.5; padding-left: 20px;
        }

        .score-central {
            background: linear-gradient(180deg, #0082c3 0%, #005a87 100%);
            clip-path: polygon(8% 0, 92% 0, 100% 100%, 0% 100%); 
            flex: 1.2; justify-content: center; align-items: center;
            flex-direction: column; margin: 0 -10px; z-index: 2;
            border-top: 2px solid rgba(255,255,255,0.3);
        }

        .score-confort {
            background: linear-gradient(180deg, #3d1a1a 0%, #260d0d 100%);
            border-bottom: 4px solid var(--rouge-infinity);
            clip-path: polygon(8% 0, 100% 0, 100% 100%, 0% 100%); 
            flex: 1.5; justify-content: flex-end; padding-right: 20px;
        }

        .maillot-footer { width: 40px !important; height: auto; margin: 0 15px; }

        .score-label { font-size: 0.7vw; opacity: 0.9; margin-bottom: -5px; }
        #tableau-score { font-size: 2.2vw; line-height: 1; }

    </style>
</head>
<body>

<div id="tv-screen">
    <header>
        <img src="Image/infinity bleu.png" class="logo-infinity">
        <div class="header-title">
            <h1>INFINITY CUP - MULTIMÉDIA vs CONFORT</h1>
            <p>VENDS UN INFINITY, FAIS AVANCER LE BALLON !</p>
        </div>
        <img src="Image/infinity rouge.png" class="logo-infinity">
    </header>

    <div class="cote-gauche">
        <img src="anthony.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="bruno.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="lionel.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="mika.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="paolo.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="raph.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="renaud.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="stephane.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="nico.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
    </div>

    <div id="stade">
        <div id="ballon"><img src="Image/ballon.png"></div>
    </div>

    <div class="cote-droite">
        <img src="christine.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="elias.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="julien.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="yassine.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="severine.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="fatima.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="emilia.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="olivier.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
        <img src="hayet.png" class="figurine-fixe" onerror="this.src='Image/ballon.png'">
    </div>

    <div id="footer-scores">
        <div class="score-segment score-multi">
            <img src="Image/maillot multi.png" class="maillot-footer" onerror="this.style.display='none'">
            Équipe Multimédia
        </div>

        <div class="score-segment score-central">
            <div class="score-label">SCORE</div>
            <div id="tableau-score">0 - 0</div>
        </div>

        <div class="score-segment score-confort">
            Équipe Confort
            <img src="Image/maillot confort.png" class="maillot-footer" onerror="this.style.display='none'">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCqgVEYrpem4KgV8OXqFN9ybMNPIz8gg9o",
        authDomain: "challenge-infinity.firebaseapp.com",
        databaseURL: "https://challenge-infinity-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "challenge-infinity",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('match').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('ballon').style.left = data.position + "%";
            document.getElementById('tableau-score').innerText = data.scoreMulti + " - " + data.scoreConfort;
        }
    });
</script>
</body>
</html>
